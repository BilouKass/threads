services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: threads
      POSTGRES_PASSWORD: threads
      POSTGRES_DB: threads
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U threads"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    build: .
    command: ["npx", "prisma", "db", "push", "--skip-generate"]
    environment:
      DATABASE_URL: postgresql://threads:threads@db:5432/threads?schema=public
    depends_on:
      db:
        condition: service_healthy

  api:
    build: .
    restart: unless-stopped
    command: ["node", "dist/server.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://threads:threads@db:5432/threads?schema=public
      HOST: 0.0.0.0
    ports:
      - "3000:3000"      # admin API + UI (can be restricted to localhost: 127.0.0.1:3000:3000)
      - "8080:8080"      # public media server (Meta downloads images from here)
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

  worker:
    build: .
    restart: unless-stopped
    command: ["node", "dist/worker.js"]
    env_file: .env
    environment:
      DATABASE_URL: postgresql://threads:threads@db:5432/threads?schema=public
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully

volumes:
  db_data:
  uploads:
